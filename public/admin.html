<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kutyamenhely - Admin</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css"> 
    <link rel="stylesheet" href="admin.css">
</head>
<body class="admin-body">

    <header>
        <nav>
            <label class="logo"><img src="img/logo2.png" alt="" style="margin-top: 10px"></label>
            <ul>
                <li><a href="index.html">Vissza a főoldalra</a></li>
            </ul>
        </nav>
    </header>

    <section class="admin-section">
        <div class="feedback-card"> <h2>Új kutya hozzáadása</h2>
            <p>Töltsd ki az alábbi adatokat az új lakó rögzítéséhez!</p>
            
            <form id="kutyaForm" enctype="multipart/form-data">
                <div class="form-group">
                    <input type="text" name="nev" class="form-control" placeholder="Kutya neve" required>
                </div>

                <div class="form-row">
                    <div class="form-group col-md-6">
                        <input type="number" name="eletkor" class="form-control" placeholder="Életkor">
                    </div>
                    <div class="form-group col-md-6">
                        <select name="nem" class="form-control" required>
                            <option value="">Válassz nemet</option>
                            <option value="kan">Kan</option>
                            <option value="szuka">Szuka</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <select name="fajta" id="fajta-kereso" class="form-control" required style="width: 100%;">
                        <option value="">Válassz fajtát</option>
                        <optgroup label="Magyar kutyafajták">
                            <option value="Puli">Puli</option>
                            <option value="Pumi">Pumi</option>
                            <option value="Mudi">Mudi</option>
                            <option value="Kuvasz">Kuvasz</option>
                            <option value="Komondor">Komondor</option>
                            <option value="Rövidszőrű magyar vizsla">Rövidszőrű magyar vizsla</option>
                            <option value="Drótszőrű magyar vizsla">Drótszőrű magyar vizsla</option>
                            <option value="Erdélyi kopó">Erdélyi kopó</option>
                            <option value="Magyar agár">Magyar agár</option>
                        </optgroup>
                
                        <optgroup label="Népszerű fajták">
                            <option value="Akita">Akita</option>
                            <option value="Alaszkai malamut">Alaszkai malamut</option>
                            <option value="Amerikai staffordshire terrier">Amerikai staffordshire terrier</option>
                            <option value="Angol bulldog">Angol bulldog</option>
                            <option value="Ausztrál juhászkutya">Ausztrál juhászkutya</option>
                            <option value="Beagle">Beagle</option>
                            <option value="Bernáthegyi">Bernáthegyi</option>
                            <option value="Berni pásztorkutya">Berni pásztorkutya</option>
                            <option value="Bichon frisé">Bichon frisé</option>
                            <option value="Border Collie">Border Collie</option>
                            <option value="Boxer">Boxer</option>
                            <option value="Cane Corso">Cane Corso</option>
                            <option value="Cocker spániel">Cocker spániel</option>
                            <option value="Csivava">Csivava</option>
                            <option value="Dachshund (Tacskó)">Dachshund (Tacskó)</option>
                            <option value="Dalmata">Dalmata</option>
                            <option value="Dobermann">Dobermann</option>
                            <option value="Francia bulldog">Francia bulldog</option>
                            <option value="Golden Retriever">Golden Retriever</option>
                            <option value="Havannai pincs (Havanese)">Havannai pincs (Havanese)</option>
                            <option value="Husky">Husky</option>
                            <option value="Ír szetter">Ír szetter</option>
                            <option value="Jack Russell terrier">Jack Russell terrier</option>
                            <option value="Labrador Retriever">Labrador Retriever</option>
                            <option value="Máltai selyemkutya">Máltai selyemkutya</option>
                            <option value="Német dog">Német dog</option>
                            <option value="Német juhász">Német juhász</option>
                            <option value="Pomerániai törpespicc">Pomerániai törpespicc</option>
                            <option value="Rottweiler">Rottweiler</option>
                            <option value="Samoyed">Samoyed</option>
                            <option value="Shar pei">Shar pei</option>
                            <option value="Shih-tzu">Shih-tzu</option>
                            <option value="Uszkár">Uszkár</option>
                            <option value="Yorkshire terrier">Yorkshire terrier</option>
                        </optgroup>
                
                        <option value="Keverék">Keverék</option>
                        <option value="Egyéb">Egyéb</option>
                    </select>
                </div>

                <div class="form-group">
                    <textarea id="adminKutyaLeiras" name="leiras" class="form-control" placeholder="A kutya története..." rows="4"></textarea>
                </div>
                
                <div class="form-group text-left">
                    <label class="file-label">Fénykép feltöltése:</label>
                    <input type="file" name="kep" class="file-input">
                </div>

                <button type="submit" class="btn btn-primary btn-block">Kutya mentése a rendszerbe</button>
            </form>
        </div>
    </section>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
    
    <script>
        $(document).ready(function() {
            // Select2 bekapcsolása a fajtaválasztónál
            $('#fajta-kereso').select2({
                placeholder: "Válassz vagy keress fajtát...",
                allowClear: true,
                language: {
                    noResults: function() {
                        return "Nincs ilyen fajta a listában";
                    }
                }
            });
        });
    </script>
    
    <script src="java.js"></script>
</body>
</html>
